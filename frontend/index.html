<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex vh-100 justify-content-center align-items-center">
        <div class="text-center">
            <h1 id="number" class="display-1 mb-4"></h1>
            <div id="loading" class="spinner-border text-primary mb-3 d-none" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <div id="error" class="alert alert-danger d-none" role="alert"></div>
            <button id="refresh" class="btn btn-primary btn-lg" onclick="fetchNumber()">Refresh</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
